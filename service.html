<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services — Moew COFFEE</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/service.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="logo">
      <img src="images/Moew.png" alt="Moew COFFEE logo" />
      <h1>Moew COFFEE</h1>
    </div>
    <nav>
      <ul>
        <li><a href="main.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="service.html" class="active">Service</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li>
          <button class="cart-btn" id="cart-open-btn" aria-label="Open cart">
            🛒 Cart
            <span class="cart-badge" id="cart-badge">0</span>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <!-- ===== SERVICES ===== -->
  <div class="services-wrapper">
    <div class="services-left">
      <h2>Our Services</h2>
      <ul>
        <li>Free Wi-Fi</li>
        <li>Fast Barista</li>
        <li>Cleanliness</li>
        <li>Friendly Staff</li>
        <li>Easy Access</li>
      </ul>
    </div>
    <div class="services-right">
      <img src="images/Restaurant-Customer-Service-1024x684.jpeg" alt="Our friendly staff serving customers" />
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>&copy; 2026 Moew COFFEE. All rights reserved.</p>
  </footer>

  <!-- ===== CART SIDEBAR ===== -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-sidebar" id="cart-sidebar" aria-label="Shopping cart">
    <div class="cart-header">
      <h2>🛒 Your Cart</h2>
      <button class="cart-close" id="cart-close-btn" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items-list" id="cart-items-list"></div>
    <div class="cart-footer">
      <div class="cart-summary">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-price" id="cart-total-price">$0.00</span>
      </div>
      <button class="checkout-btn" id="cart-checkout-btn">Place Order</button>
      <button class="clear-cart-btn" id="cart-clear-btn">Clear Cart</button>
    </div>
  </aside>

  <div class="toast" id="cart-toast"></div>
  <script src="js/cart.js"></script>
</body>
</html>
