<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home — Moew COFFEE</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="logo">
      <img src="images/Moew.png" alt="Moew Coffee logo" />
      <h1>Moew COFFEE</h1>
    </div>
    <nav>
      <ul>
        <li><a href="main.html" class="active">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="service.html">Service</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li>
          <button class="cart-btn" id="cart-open-btn" aria-label="Open cart">
            🛒 Cart
            <span class="cart-badge" id="cart-badge">0</span>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <article class="hero-text">
      <h2>COFFEE TIME</h2>
      <p>We serve fresh coffee made from high-quality beans.<br>Relax and enjoy your time with us.</p>
      <a href="menu.html" class="hero-cta">View Menu →</a>
    </article>
    <div class="hero-image">
      <img src="images/CoffeePlaceholder.png" alt="A beautifully crafted coffee cup" />
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>&copy; 2026 Moew COFFEE. All rights reserved.</p>
  </footer>

  <!-- ===== CART SIDEBAR ===== -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-sidebar" id="cart-sidebar" aria-label="Shopping cart">
    <div class="cart-header">
      <h2>🛒 Your Cart</h2>
      <button class="cart-close" id="cart-close-btn" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items-list" id="cart-items-list"></div>
    <div class="cart-footer">
      <div class="cart-summary">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-price" id="cart-total-price">$0.00</span>
      </div>
      <button class="checkout-btn" id="cart-checkout-btn">Place Order</button>
      <button class="clear-cart-btn" id="cart-clear-btn">Clear Cart</button>
    </div>
  </aside>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="cart-toast"></div>

  <script src="js/cart.js"></script>
</body>
</html>
